<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajax Example</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>  <!-- Use CDN for jQuery -->
</head>
<body>

  <div id="result"></div>

  <script>
    $(document).ready(function() {
      // Simple Ajax GET request
      $.ajax({
        url: 'https://api.github.com/users/octocat',  // Example: Fetch GitHub user data
        type: 'GET',
        success: function(data) {
          $('#result').html(`<h3>User: ${data.login}</h3><p>${data.bio}</p>`);
        },
        error: function(error) {
          $('#result').html('<p>Error fetching data!</p>');
        }
      });
    });
  </script>

</body>
</html>
