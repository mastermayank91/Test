<html>

<head>
  <title> mastermayank testing </title>

  <script src="./jquery.min.js"></script>

</head>

<body>

  <div id='output-box'></div>

  <!-- ( testing ) -->
  <script>

    $(document).ready(function () {

      let console.log('i am on')

      $("$output-box").html(` <h1> ajax </h1> `)

      $.ajax({
          url :  `https://jsonplaceholder.typicode.com/users`,
          type : 'GET',
          beforeSend : () => {
      
              $("#output-box").html(`
                  <div class="spinner-border" role="status" id='loader'>
                      <span class="visually-hidden">Loading...</span>
                  </div>
              `)
          },
          success : (data) => {
      
              for (let i = 0; i < data.length; i++) 
              {
                  $.each(data[i], (key,value) => {
      
                      if (key == 'address')
                      {
                          let address = value
      
                          $.each(address, (key,value) => {
                              
                              if (key == 'geo')
                              {
                                  let geo = value
      
                                  $.each(geo, (key, value) => {
                                      $("#output-box").append(`<div class='row'> <div class='col'> ${key} </div> <div class='col text-end'>${value}</div> </div>`)
                                  })
                              }
                              else
                              {
                                  $("#output-box").append(`<div class='row'> <div class='col'> ${key} </div> <div class='col text-end'>${value}</div> </div>`)
                              }
                          })   
                      }
                      else if (key == 'company')
                      {
                          let company = value
      
                          $.each(company, (key,value) => {
      
                              $("#output-box").append(`<div class='row'> <div class='col'> ${key} </div> <div class='col text-end'>${value}</div> </div>`)
                          })
                      }
                      else
                      {
                          $("#output-box").append(`<div class='row'> <div class='col'> ${key} </div> <div class='col text-end'>${value}</div> </div>`)
                      }
                  })
              }
          },
          error : (error) => {
      
              $("#output-box").append(`<div class='alert alert-danger'> data fetch error : ${error} </div>`)
          },
          complete : () => {
      
              $("#output-box #loader").css('display','none')
          }
          })

  </script>

</body>

</html>
